services:
  postgres:
    image: postgres:16-alpine
    container_name: lck-archive-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lck_archive
      TZ: Asia/Seoul
    ports:
      - "15432:5432"
    volumes:
      - lck_archive_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lck_archive"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  lck_archive_postgres_data:
